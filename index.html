<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Stanley</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        /* Particle canvas */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* Content wrapper */
        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 48px;
        }

        /* Welcome text */
        .welcome {
            font-size: 38px;
            font-weight: 300;
            letter-spacing: -0.5px;
            color: #9aa0a6;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.2s forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Search Bar */
        .search-form {
            width: 100%;
            max-width: 580px;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.35s forwards;
            margin-bottom: 8px;
        }

        .search-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-icon {
            position: absolute;
            left: 20px;
            color: #9aa0a6;
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px 16px 52px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            outline: none;
            backdrop-filter: blur(12px);
            transition: all 0.3s ease;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        .search-input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 32px rgba(66, 133, 244, 0.15);
        }

        /* Links grid */
        .links {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.5s forwards;
        }

        .link-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            padding: 28px 32px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            text-decoration: none;
            color: #e0e0e0;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 150px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .link-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 20px;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255, 255, 255, 0.08) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.35s ease;
            pointer-events: none;
        }

        .link-card:hover::before {
            opacity: 1;
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-6px) scale(1.03);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .link-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: transform 0.35s ease;
        }

        .link-card:hover .link-icon {
            transform: scale(1.1);
        }

        .link-icon.wikamp {
            background: linear-gradient(135deg, #1a237e, #3949ab);
        }

        .link-icon.calendar {
            background: linear-gradient(135deg, #4285F4, #137333);
        }

        .link-icon.gemini {
            background: linear-gradient(135deg, #4285F4, #8ab4f8);
        }

        .link-icon.messenger {
            background: linear-gradient(135deg, #0084ff, #00c6ff);
        }

        .link-icon.youtube {
            background: linear-gradient(135deg, #c4302b, #ff6b6b);
        }

        .link-icon.celcat {
            background: linear-gradient(135deg, #ff8f00, #ff3d00);
        }

        .link-icon.maps {
            background: rgba(255, 255, 255, 0.08);
        }

        .link-icon.gmail {
            background: linear-gradient(135deg, #ea4335, #fbbc05);
        }

        .link-label {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        /* Subtle bottom glow */
        .glow {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 300px;
            background: radial-gradient(ellipse, rgba(66, 133, 244, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Clock */
        .clock {
            font-size: 14px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 1px;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.8s forwards;
        }
    </style>
</head>

    <script>
        // ===== PARTICLE ANIMATION (inspired by antigravity.google) =====
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        let animationId;

        // Google-inspired colors adjusted for dark theme (slightly brighter/more vibrant)
        const colors = [
            '#5e9bff',  // Blue (brighter)
            '#ff6b5e',  // Red (softer)
            '#ffd54f',  // Yellow (warm)
            '#4eca6a',  // Green (vivid)
            '#a78bfa',  // Purple (accent)
            '#ff8a80',  // Coral
        ];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function createParticle() {
            const color = colors[Math.floor(Math.random() * colors.length)];
            return {
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                baseX: Math.random() * canvas.width,
                baseY: Math.random() * canvas.height,
                size: Math.random() * 2.5 + 0.8,
                length: Math.random() * 6 + 2,     // dash length
                color: color,
                alpha: Math.random() * 0.5 + 0.2,
                angle: Math.random() * Math.PI * 2,
                rotationSpeed: (Math.random() - 0.5) * 0.02,
                vx: 0,
                vy: 0,
                driftX: (Math.random() - 0.5) * 0.3,
                driftY: (Math.random() - 0.5) * 0.3,
            };
        }

        function init() {
            resize();
            particles = [];
            const count = Math.min(Math.floor((canvas.width * canvas.height) / 5000), 300);
            for (let i = 0; i < count; i++) {
                particles.push(createParticle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                // Calculate distance to mouse
                const dx = mouse.x - p.x;
                const dy = mouse.y - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const maxDist = 200;

                if (dist < maxDist) {
                    // Particles gently orbit/swirl around cursor
                    const force = (1 - dist / maxDist) * 0.8;
                    const attractAngle = Math.atan2(dy, dx);
                    // Perpendicular component for orbiting + slight attraction
                    p.vx += (Math.cos(attractAngle + Math.PI / 2) * force * 0.5 + Math.cos(attractAngle) * force * 0.15);
                    p.vy += (Math.sin(attractAngle + Math.PI / 2) * force * 0.5 + Math.sin(attractAngle) * force * 0.15);
                }

                // Gentle drift
                p.vx += p.driftX * 0.01;
                p.vy += p.driftY * 0.01;

                // Return to base position very slowly
                p.vx += (p.baseX - p.x) * 0.0003;
                p.vy += (p.baseY - p.y) * 0.0003;

                // Apply friction
                p.vx *= 0.97;
                p.vy *= 0.97;

                // Update position
                p.x += p.vx;
                p.y += p.vy;

                // Rotate
                p.angle += p.rotationSpeed;

                // Draw dash
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.angle);
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.length / 2, -p.size / 2, p.length, p.size);
                ctx.restore();
            });

            animationId = requestAnimationFrame(animate);
        }

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('resize', () => {
            resize();
            // Re-distribute base positions
            particles.forEach(p => {
                p.baseX = Math.random() * canvas.width;
                p.baseY = Math.random() * canvas.height;
            });
        });

        init();
        animate();

        // ===== CLOCK =====
        function updateClock() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            document.getElementById('clock').textContent = now.toLocaleDateString('en-US', options);
        }
        updateClock();
        setInterval(updateClock, 10000);

        // ===== CARD MOUSE GLOW =====
        document.querySelectorAll('.link-card').forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * 100;
                const y = ((e.clientY - rect.top) / rect.height) * 100;
                card.style.setProperty('--mouse-x', x + '%');
                card.style.setProperty('--mouse-y', y + '%');
            });
        });
    </script>
</body>

</html>
